<!DOCTYPE html>
<html>
<head>
    <title>Comments</title>
</head>
<body>
    <h1>Leave a comment</h1>
    <form method="post">
        <textarea name="text" rows="4" cols="50"></textarea><br>
        <button type="submit">Send</button>
    </form>

    <h2>Previous comments:</h2>
    <ul>
        {% for comment in comments %}
            <li>{{ comment }}</li>
        {% endfor %}
    </ul>
</body>
</html>
